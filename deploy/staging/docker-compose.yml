services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-instruments_platform_staging}
      POSTGRES_USER: ${POSTGRES_USER:-platform_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_app_staging}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform_app} -d ${POSTGRES_DB:-instruments_platform_staging}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - platform_staging_postgres_data:/var/lib/postgresql/data

  migrator:
    build:
      context: ../..
      dockerfile: deploy/staging/migrator.Dockerfile
    environment:
      PLATFORM_DESIGN_TIME_CONNECTION: Host=postgres;Port=5432;Database=${POSTGRES_DB:-instruments_platform_staging};Username=${POSTGRES_USER:-platform_app};Password=${POSTGRES_PASSWORD:-platform_app_staging}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  runtime-role:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-platform_app_staging}
      POSTGRES_DB: ${POSTGRES_DB:-instruments_platform_staging}
      POSTGRES_USER: ${POSTGRES_USER:-platform_app}
      POSTGRES_RUNTIME_USER: ${POSTGRES_RUNTIME_USER:-platform_app_runtime}
      POSTGRES_RUNTIME_PASSWORD: ${POSTGRES_RUNTIME_PASSWORD:-platform_app_runtime}
      POSTGRES_WORKER_USER: ${POSTGRES_WORKER_USER:-platform_worker}
      POSTGRES_WORKER_PASSWORD: ${POSTGRES_WORKER_PASSWORD:-platform_worker_staging}
    command: >
      sh -c "psql -v ON_ERROR_STOP=1 -v runtime_user=\"$$POSTGRES_RUNTIME_USER\" -v runtime_password=\"$$POSTGRES_RUNTIME_PASSWORD\" -v worker_user=\"$$POSTGRES_WORKER_USER\" -v worker_password=\"$$POSTGRES_WORKER_PASSWORD\" -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /runtime/runtime-role.sql"
    volumes:
      - ./runtime-role.sql:/runtime/runtime-role.sql:ro
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: "no"

  seed:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-platform_app_staging}
      POSTGRES_DB: ${POSTGRES_DB:-instruments_platform_staging}
      POSTGRES_USER: ${POSTGRES_USER:-platform_app}
    command: >
      sh -c "psql -v ON_ERROR_STOP=1 -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -f /seed/seed-dev.sql"
    volumes:
      - ../local/seed-dev.sql:/seed/seed-dev.sql:ro
    depends_on:
      runtime-role:
        condition: service_completed_successfully
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: deploy/staging/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PlatformDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-instruments_platform_staging};Username=${POSTGRES_RUNTIME_USER:-platform_app_runtime};Password=${POSTGRES_RUNTIME_PASSWORD:-platform_app_runtime}
      Authentication__Dev__Enabled: ${Authentication__Dev__Enabled:-true}
      Authentication__Dev__AllowedOrigins__0: http://127.0.0.1:${WEB_HTTP_PORT:-5174}
      Authentication__Dev__AllowedOrigins__1: http://localhost:${WEB_HTTP_PORT:-5174}
      Authentication__Oidc__InteractiveEnabled: ${Authentication__Oidc__InteractiveEnabled:-false}
      Authentication__Oidc__Authority: ${Authentication__Oidc__Authority:-}
      Authentication__Oidc__ClientId: ${Authentication__Oidc__ClientId:-}
      Authentication__Oidc__ClientSecret: ${Authentication__Oidc__ClientSecret:-}
      Authentication__Oidc__CallbackPath: ${Authentication__Oidc__CallbackPath:-/auth/callback}
      Authentication__Oidc__SignedOutCallbackPath: ${Authentication__Oidc__SignedOutCallbackPath:-/auth/signout-callback}
      Authentication__Oidc__RequireHttpsMetadata: ${Authentication__Oidc__RequireHttpsMetadata:-true}
      Authentication__Oidc__RequireVerifiedEmail: ${Authentication__Oidc__RequireVerifiedEmail:-true}
      Authentication__Oidc__SessionMinutes: ${Authentication__Oidc__SessionMinutes:-480}
      Authentication__Oidc__ProviderKey: ${Authentication__Oidc__ProviderKey:-auth0}
      Authentication__Oidc__EmailClaim: ${Authentication__Oidc__EmailClaim:-email}
      Authentication__Oidc__SubjectClaim: ${Authentication__Oidc__SubjectClaim:-sub}
      Authentication__Oidc__SubjectTenantClaim: ${Authentication__Oidc__SubjectTenantClaim:-}
      Authentication__Oidc__AssumeEmailVerifiedWhenClaimMissing: ${Authentication__Oidc__AssumeEmailVerifiedWhenClaimMissing:-false}
      Authentication__Oidc__ProviderLogoutMode: ${Authentication__Oidc__ProviderLogoutMode:-auth0}
      Registration__Enabled: ${Registration__Enabled:-false}
      Registration__IntentMinutes: ${Registration__IntentMinutes:-15}
      Registration__BetaAccessCodeSha256Hashes__0: ${Registration__BetaAccessCodeSha256Hashes__0:-}
      TestDataTools__Enabled: ${TestDataTools__Enabled:-false}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0:-http://127.0.0.1:5174}
      Cors__AllowedOrigins__1: ${Cors__AllowedOrigins__1:-http://localhost:5174}
      EmailDelivery__Provider: ${EmailDelivery__Provider:-local-dev}
      EmailDelivery__ManagedProviderName: ${EmailDelivery__ManagedProviderName:-}
      EmailDelivery__SenderDomainVerified: ${EmailDelivery__SenderDomainVerified:-false}
      EmailDelivery__VerifiedSenderDomain: ${EmailDelivery__VerifiedSenderDomain:-}
      EmailDelivery__FromAddress: ${EmailDelivery__FromAddress:-}
      EmailDelivery__PublicAppBaseUrl: ${EMAIL_DELIVERY_PUBLIC_APP_BASE_URL:-https://validatedscale-staging.croat.dev}
      EmailDelivery__InvitationFooterText: ${EmailDelivery__InvitationFooterText:-}
      EmailDelivery__ProviderWebhookSecret: ${EmailDelivery__ProviderWebhookSecret:-}
      EmailDelivery__AwsSes__SnsTopicArn: ${EmailDelivery__AwsSes__SnsTopicArn:-}
      EmailDelivery__Smtp__Host: ${EmailDelivery__Smtp__Host:-}
      EmailDelivery__Smtp__Port: ${EmailDelivery__Smtp__Port:-25}
      EmailDelivery__Smtp__EnableSsl: ${EmailDelivery__Smtp__EnableSsl:-true}
      EmailDelivery__Smtp__UserName: ${EmailDelivery__Smtp__UserName:-}
      EmailDelivery__Smtp__Password: ${EmailDelivery__Smtp__Password:-}
      ExportArtifacts__ObjectStore__Provider: ${ExportArtifacts__ObjectStore__Provider:-local}
      ExportArtifacts__ObjectStore__RootPath: ${ExportArtifacts__ObjectStore__RootPath:-/var/lib/instruments-platform/export-artifacts}
      ExportArtifacts__ObjectStore__S3__Endpoint: ${ExportArtifacts__ObjectStore__S3__Endpoint:-}
      ExportArtifacts__ObjectStore__S3__BucketName: ${ExportArtifacts__ObjectStore__S3__BucketName:-}
      ExportArtifacts__ObjectStore__S3__Region: ${ExportArtifacts__ObjectStore__S3__Region:-us-east-1}
      ExportArtifacts__ObjectStore__S3__AccessKeyId: ${ExportArtifacts__ObjectStore__S3__AccessKeyId:-}
      ExportArtifacts__ObjectStore__S3__SecretAccessKey: ${ExportArtifacts__ObjectStore__S3__SecretAccessKey:-}
      Reports__PdfRenderer__BrowserExecutablePath: ${Reports__PdfRenderer__BrowserExecutablePath:-/usr/bin/chromium}
      Reports__PdfRenderer__TimeoutMilliseconds: ${Reports__PdfRenderer__TimeoutMilliseconds:-30000}
      Reports__PdfRenderer__DisableSandbox: ${Reports__PdfRenderer__DisableSandbox:-true}
    volumes:
      - platform_staging_export_artifacts:/var/lib/instruments-platform/export-artifacts
      - platform_staging_data_protection_keys:/root/.aspnet/DataProtection-Keys
    ports:
      - "${API_HTTP_PORT:-5055}:8080"
    depends_on:
      seed:
        condition: service_completed_successfully

  worker:
    build:
      context: ../..
      dockerfile: deploy/staging/worker.Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__PlatformDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-instruments_platform_staging};Username=${POSTGRES_WORKER_USER:-platform_worker};Password=${POSTGRES_WORKER_PASSWORD:-platform_worker_staging}
      OutboxRelay__Enabled: ${OutboxRelay__Enabled:-true}
      OutboxRelay__BatchSize: ${OutboxRelay__BatchSize:-100}
      OutboxRelay__PollIntervalSeconds: ${OutboxRelay__PollIntervalSeconds:-1}
      OutboxRelay__ProcessOnStartup: ${OutboxRelay__ProcessOnStartup:-true}
      WorkerHeartbeat__Enabled: ${WorkerHeartbeat__Enabled:-true}
      WorkerHeartbeat__WorkerName: ${WorkerHeartbeat__WorkerName:-platform-workers}
      WorkerHeartbeat__InitialDelaySeconds: ${WorkerHeartbeat__InitialDelaySeconds:-5}
      WorkerHeartbeat__IntervalSeconds: ${WorkerHeartbeat__IntervalSeconds:-30}
      RetentionAutomation__Enabled: ${RetentionAutomation__Enabled:-false}
      ReportPdfArtifacts__Enabled: ${ReportPdfArtifacts__Enabled:-false}
      ExportArtifacts__ObjectStore__Provider: ${ExportArtifacts__ObjectStore__Provider:-local}
      ExportArtifacts__ObjectStore__RootPath: ${ExportArtifacts__ObjectStore__RootPath:-/var/lib/instruments-platform/export-artifacts}
      ExportArtifacts__ObjectStore__S3__Endpoint: ${ExportArtifacts__ObjectStore__S3__Endpoint:-}
      ExportArtifacts__ObjectStore__S3__BucketName: ${ExportArtifacts__ObjectStore__S3__BucketName:-}
      ExportArtifacts__ObjectStore__S3__Region: ${ExportArtifacts__ObjectStore__S3__Region:-us-east-1}
      ExportArtifacts__ObjectStore__S3__AccessKeyId: ${ExportArtifacts__ObjectStore__S3__AccessKeyId:-}
      ExportArtifacts__ObjectStore__S3__SecretAccessKey: ${ExportArtifacts__ObjectStore__S3__SecretAccessKey:-}
      Reports__PdfRenderer__BrowserExecutablePath: ${Reports__PdfRenderer__BrowserExecutablePath:-/usr/bin/chromium}
      Reports__PdfRenderer__TimeoutMilliseconds: ${Reports__PdfRenderer__TimeoutMilliseconds:-30000}
      Reports__PdfRenderer__DisableSandbox: ${Reports__PdfRenderer__DisableSandbox:-true}
    volumes:
      - platform_staging_export_artifacts:/var/lib/instruments-platform/export-artifacts
    depends_on:
      seed:
        condition: service_completed_successfully

  web:
    build:
      context: ../..
      dockerfile: deploy/staging/web.Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://127.0.0.1:5055}
      PUBLIC_DEV_AUTH_ENABLED: ${PUBLIC_DEV_AUTH_ENABLED:-true}
    ports:
      - "${WEB_HTTP_PORT:-5174}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  platform_staging_postgres_data:
  platform_staging_export_artifacts:
  platform_staging_data_protection_keys:
