services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: instruments_platform_dev
      POSTGRES_USER: platform_app
      POSTGRES_PASSWORD: platform_app_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_app -d instruments_platform_dev"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - platform_postgres_data:/var/lib/postgresql/data

volumes:
  platform_postgres_data:
